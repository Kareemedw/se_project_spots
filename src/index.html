<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Spots Landing Page" />
    <meta name="author" content="Kareem Edwards Software Engineer" />
    <meta name="keywords" content="HTML, CSS" />
    <link rel="shortcut icon" href="favicon.ico" />
    <title>Spots</title>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img
          src="<%=require('./images/logo.svg')%>"
          alt="Spots logo"
          class="header__logo"
        />
      </header>
      <main class="content">
        <section class="profile page__section">
          <div class="profile__avatar-container">
            <button type="button" class="profile__avatar-btn" aria-label="Open">
              <img
                src="<%=require('./images/pencil-light.svg')%>"
                alt="Pencil Icon"
                class="profile__pencil-light"
              />
            </button>
            <img
              src="<%=require('./images/coleman.svg')%>"
              alt="Bessie Coleman"
              class="profile__image"
            />
          </div>
          <div class="profile__content">
            <div class="profile__title">
              <h1 class="profile__title-name">Bessie Coleman</h1>
              <p class="profile__title-description">Civil Aviator</p>
            </div>
            <button type="button" class="profile__edit-btn" aria-label="Open">
              <img src="<%=require('./images/pen-icon.svg')%>" alt="Pen icon" />
              Edit Profile
            </button>
          </div>
          <button type="button" class="profile__button" aria-label="Open">
            <img src="<%=require('./images/plus-icon.svg')%>" alt="Plus icon" />
            New Post
          </button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list">
            <template id="card-template">
              <li class="card">
                <button
                  type="button"
                  class="card__delete-btn"
                  aria-label="Delete"
                >
                  <div class="card__delete-icon"></div>
                </button>
                <img src="#" alt="" class="card__image" />
                <div class="card__content">
                  <h2 class="card__content-name"></h2>
                  <button type="button" class="card__content-button">
                    <div class="card__content-image"></div>
                  </button>
                </div>
              </li>
            </template>
          </ul>
        </section>
      </main>
      <footer class="footer page__section">
        <p class="footer__title">2025 &copy; Spots</p>
      </footer>
      <div class="modal" id="edit-profile-modal">
        <div class="modal__container">
          <button
            type="button"
            class="modal__close-btn"
            aria-label="Close"
          ></button>
          <h2 class="modal__title">Edit profile</h2>
          <form class="modal__form" id="edit-modal-form" novalidate>
            <label
              for="profile-name-input"
              class="modal__label modal__label_name"
              >Name
              <input
                id="profile-name-input"
                type="text"
                class="modal__input"
                placeholder="Type your name"
                minlength="2"
                maxlength="40"
                required
              />
              <span id="profile-name-input-error" class="modal__error"></span>
            </label>
            <label
              for="profile-description-input"
              class="modal__label modal__label_description"
              >Description
              <input
                id="profile-description-input"
                type="text"
                class="modal__input"
                placeholder="Describe yourself"
                minlength="2"
                maxlength="200"
                required
              />
              <span
                id="profile-description-input-error"
                class="modal__error"
              ></span>
            </label>
            <button type="submit" class="modal__submit_btn" aria-label="Submit">
              Save
            </button>
          </form>
        </div>
      </div>
      <div class="modal" id="new-post-modal">
        <div class="modal__container">
          <button
            type="button"
            class="modal__close-btn"
            aria-label="Close"
          ></button>
          <h2 class="modal__title">New post</h2>
          <form class="modal__form" id="new_post-modal-form" novalidate>
            <label
              for="card-image-input"
              class="modal__label modal__label_image"
              >Image link
              <input
                id="card-image-input"
                type="url"
                class="modal__input"
                placeholder="Paste a link to the picture"
                required
              />
              <span id="card-image-input-error" class="modal__error"></span>
            </label>
            <label
              for="card-caption-input"
              class="modal__label modal__label_caption"
              >Caption
              <input
                id="card-caption-input"
                type="text"
                class="modal__input"
                placeholder="Type your caption"
                minlength="2"
                maxlength="30"
                required
              />
              <span id="card-caption-input-error" class="modal__error"></span>
            </label>
            <button type="submit" class="modal__submit_btn" aria-label="Submit">
              Save
            </button>
          </form>
        </div>
      </div>
      <div class="modal" id="card-modal">
        <div class="modal__card-container">
          <button
            type="button"
            class="modal__close-btn modal__close-btn_type_preview"
            aria-label="Close"
          ></button>
          <img src="#" alt="" class="modal__image" />
          <p class="modal__caption"></p>
        </div>
      </div>
      <div class="modal" id="avatar-modal">
        <div class="modal__container">
          <button
            type="button"
            class="modal__close-btn"
            aria-label="Close"
          ></button>
          <h2 class="modal__title">Edit Avatar</h2>
          <form class="modal__form" id="edit-avatar-form" novalidate>
            <label for="profile-avatar-input" class="modal__label"
              >Profile Picture
              <input
                id="profile-avatar-input"
                type="url"
                class="modal__input"
                placeholder="Paste the link to an image"
                minlength="2"
                required
              />
              <span id="profile-avatar-input-error" class="modal__error"></span>
            </label>
            <button type="submit" class="modal__submit_btn" aria-label="Submit">
              Save
            </button>
          </form>
        </div>
      </div>
      <div class="modal" id="delete-modal">
        <div class="modal__container">
          <button
            type="button"
            class="modal__close-btn modal__close-btn_delete"
            aria-label="Close"
          ></button>
          <h2 class="modal__title modal__title-delete_caption">
            Are you sure you want to delete this image?
          </h2>
          <form class="modal__form modal__form-delete" id="delete-form">
            <button
              type="submit"
              class="modal__submit_btn modal__submit_btn_delete"
              aria-label="Delete"
            >
              Delete
            </button>
            <button
              type="button"
              class="modal__submit_btn modal__submit_btn_cancel"
              aria-label="Cancel"
            >
              Cancel
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
